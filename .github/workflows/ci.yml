name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Maven tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run tests
        run: ./mvnw test

      - name: Build Docker image
        run: docker build -t java-cloud-platform-lab .

      - name: Validate Docker Compose configuration
        run: docker compose config

      - name: Validate Kubernetes manifests
        run: docker run --rm -v "${{ github.workspace }}:/workspace" ghcr.io/yannh/kubeconform:latest -strict -summary /workspace/k8s

      - name: Validate Prometheus configuration
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "${{ github.workspace }}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro" \
            -v "${{ github.workspace }}/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro" \
            prom/prometheus:latest \
            check config /etc/prometheus/prometheus.yml

      - name: Validate Prometheus alert rules
        run: |
          docker run --rm \
            --entrypoint promtool \
            -v "${{ github.workspace }}/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro" \
            prom/prometheus:latest \
            check rules /etc/prometheus/alerts.yml

  documentation:
    name: Markdown links
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --include-fragments
            --no-progress
            --root-dir "${{ github.workspace }}"
            './**/*.md'
          fail: true
          failIfEmpty: true
          jobSummary: true

  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform
        run: terraform init -backend=false -input=false -lockfile=readonly

      - name: Validate Terraform configuration
        run: terraform validate -no-color
